  <ellipse cx="146" cy="132" rx="16" ry="10" fill="#FF8FAB" opacity="0.5"/>
  <!-- Whiskers -->
  <line x1="16" y1="118" x2="86" y2="122" stroke="#E07800" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="130" x2="86" y2="128" stroke="#E07800" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="204" y1="118" x2="134" y2="122" stroke="#E07800" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="204" y1="130" x2="134" y2="128" stroke="#E07800" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Stars/sparkles around head -->
  <text x="12" y="68" font-size="20" fill="#FFD700">★</text>
  <text x="186" y="68" font-size="16" fill="#FFD700">★</text>
  <text x="100" y="30" font-size="14" fill="#FF4D6D">♥</text>
  <text x="170" y="100" font-size="12" fill="#FFD700">✦</text>
  <text x="30" y="100" font-size="12" fill="#FFD700">✦</text>
