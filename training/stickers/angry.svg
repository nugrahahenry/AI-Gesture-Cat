  <line x1="16" y1="118" x2="86" y2="122" stroke="#CC4444" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="130" x2="86" y2="128" stroke="#CC4444" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="204" y1="118" x2="134" y2="122" stroke="#CC4444" stroke-width="1.8" stroke-linecap="round"/>
