<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C5CFC"/>
      <stop offset="100%" style="stop-color:#FF6B9D"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9f0"/>
      <stop offset="100%" style="stop-color:#ffe8d0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Cat ears (triangles) -->
  <polygon points="11,22 17,6 25,20" fill="url(#face)"/>
  <polygon points="39,20 47,6 53,22" fill="url(#face)"/>
  <!-- Inner ear pink -->
  <polygon points="13,20 17,9 23,19" fill="#FF6B9D" opacity="0.6"/>
  <polygon points="41,19 47,9 51,20" fill="#FF6B9D" opacity="0.6"/>

  <!-- Cat face -->
  <ellipse cx="32" cy="36" rx="20" ry="18" fill="url(#face)"/>

  <!-- Eyes -->
  <ellipse cx="24" cy="32" rx="3.5" ry="4" fill="#3a2060"/>
  <ellipse cx="40" cy="32" rx="3.5" ry="4" fill="#3a2060"/>
  <!-- Eye shine -->
  <circle cx="25.5" cy="30.5" r="1.2" fill="white"/>
  <circle cx="41.5" cy="30.5" r="1.2" fill="white"/>

  <!-- Nose -->
  <polygon points="32,38 30,41 34,41" fill="#FF6B9D"/>

  <!-- Mouth -->
  <path d="M30,41 Q28,45 26,43" stroke="#3a2060" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M34,41 Q36,45 38,43" stroke="#3a2060" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Whiskers left -->
  <line x1="8" y1="37" x2="22" y2="39" stroke="#7C5CFC" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="8" y1="41" x2="22" y2="41" stroke="#7C5CFC" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <!-- Whiskers right -->
  <line x1="42" y1="39" x2="56" y2="37" stroke="#7C5CFC" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="42" y1="41" x2="56" y2="41" stroke="#7C5CFC" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
</svg>
